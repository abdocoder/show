<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABDO STAH Streaming </title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }
        .channel-btn {
            background-color: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }
        .channel-btn:hover {
            background-color: #334155;
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .channel-btn.active {
            background-color: #0ea5e9;
            color: white;
            border-color: #0ea5e9;
        }
        .status-bar {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
        }
        .warning {
            color: #fbbf24;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<img  height="200px
     "  src="images/abdo.png">
    
    <h1>ABDO STAH-streams</h1>
    

    <div class="player-container" id="player">
        <div style="display: flex; height: 100%; align-items: center; justify-content: center; color: #64748b; text-align: center; padding: 20px;">
            Select a channel to start watching.<br>
            Note: beIN streams are updated frequently.
        </div>
    </div>

    <div class="channel-list">
        <!-- beIN Channels with multiple fallback options -->
        
        <!-- Live Channels -->
        <button class="channel-btn" onclick="loadChannel('https://soccerball.st/rampages/unoair1/', this)">Live 1 ENG</button>
        <button class="channel-btn" onclick="loadChannel('https://statusnode.is/nodejs/?t=1', this)">Live 2 ENG</button>
        <button class="channel-btn" onclick="loadChannel('https://18.livekoora.blog/albaplayer/live1/', this)">Live 3 (AR)</button>
        <button class="channel-btn" onclick="loadChannel('https://tops.poiy.online/albaplayer/max1/', this)">Live 4 (AR)</button>
        
        <button class="channel-btn" onclick="loadChannel('https://ar.liveskora.com/albaplayer/p-1/?serv=1', this)">Live multi</button>
        <button class="channel-btn" onclick="loadChannel('https://up.fawa.news/?p=351', this)">Live (FAWA)</button>

        
        <button class="channel-btn" onclick="loadChannel('https://freesportshd.space/stream/tsn-3-hd-ca-france-vs-iraq-7213552016-155586', this)">freesport site</button>
 
      
        
    </div>

    <div class="status-bar" id="status">Ready</div>
    <div class="warning">Ad-blocking sandbox enabled. If a player doesn't load, try another source.</div>

    <script>
        function loadChannel(url, btn) {
            const player = document.getElementById('player');
            const status = document.getElementById('status');
            
            // Update active button
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Load iframe with SANDBOX to block popups and ads
            // We allow-scripts and allow-same-origin for the player to function
            // We EXCLUDE allow-popups and allow-modals to block ads
            player.innerHTML = `<iframe 
                src="${url}" 
                allowfullscreen 
                allow="autoplay; encrypted-media"
                sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
            ></iframe>`;
            
            status.innerText = `Current Channel: ${btn.innerText}`;
            
            console.log('Loading channel:', url);
        }
    </script>
</body>
</html>
